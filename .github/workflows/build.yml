name: ビルド

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: macOSアプリをビルド
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: チェックアウト
        uses: actions/checkout@v6

      - name: Xcodeを選択
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: ビルドしてパッケージ作成
        run: scripts/package_app.sh

      - name: 配布物を検証
        run: |
          test -f dist/ChromeProfileRouter.zip
          test -f dist/ChromeProfileRouter.dmg
          hdiutil verify dist/ChromeProfileRouter.dmg
          codesign --verify --deep --strict --verbose=2 DerivedData/Build/Products/Release/ChromeProfileRouter.app

      - name: アーティファクトをアップロード
        uses: actions/upload-artifact@v7
        with:
          name: ChromeProfileRouter-${{ github.run_id }}
          path: |
            dist/ChromeProfileRouter.zip
            dist/ChromeProfileRouter.dmg
          if-no-files-found: error
          retention-days: 14

  release:
    name: リリースアセットを公開
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-macos
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: アーティファクトを取得
        uses: actions/download-artifact@v8
        with:
          name: ChromeProfileRouter-${{ github.run_id }}
          path: dist

      - name: GitHub Releaseを作成または更新
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --notes "macOS版 Chrome Profile Router の自動ビルドです。"
          fi
          gh release upload "$tag" \
            dist/ChromeProfileRouter.zip \
            dist/ChromeProfileRouter.dmg \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
