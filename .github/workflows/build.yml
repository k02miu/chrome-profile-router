name: ビルド

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: macOSアプリをビルド
    runs-on: macos-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Xcodeを選択
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: ビルドしてパッケージ作成
        run: scripts/package_app.sh

      - name: アーティファクトをアップロード
        uses: actions/upload-artifact@v4
        with:
          name: ChromeProfileRouter
          path: dist/ChromeProfileRouter.zip
          if-no-files-found: error

      - name: リリースアセットを公開
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ChromeProfileRouter.zip
